<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GovBot — 정부 지원사업 보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <button class="icon-btn" id="toggle-dark" title="다크모드 전환">🌙</button>
        <div>
          <h1>GovBot</h1>
          <p class="subtitle">정부 지원사업 Fix 보드</p>
        </div>
        <button class="icon-btn" id="open-settings" title="설정">⚙️</button>
      </div>
    </header>

    <div class="controls">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-category="전체">전체</button>
        <button class="filter-btn" data-category="기술">기술</button>
        <button class="filter-btn" data-category="인력">인력</button>
        <button class="filter-btn" data-category="내수">내수</button>
        <button class="filter-btn" data-category="창업">창업</button>
        <button class="filter-btn" data-category="경영">경영</button>
        <button class="filter-btn" data-category="생활안정">생활안정</button>
        <button class="filter-btn" data-category="주거·자립">주거·자립</button>
        <button class="filter-btn" data-category="보육·교육">보육·교육</button>
        <button class="filter-btn" data-category="고용·창업">고용·창업</button>
        <button class="filter-btn" data-category="보건·의료">보건·의료</button>
        <button class="filter-btn" data-category="행정·안전">행정·안전</button>
        <button class="filter-btn" data-category="임신·출산">임신·출산</button>
        <button class="filter-btn" data-category="문화·환경">문화·환경</button>
        <button class="filter-btn" data-category="기타">기타</button>
      </div>
      <div class="search-sort">
        <input type="text" id="search" placeholder="키워드 검색..." />
        <select id="sort">
          <option value="dday">마감일순</option>
          <option value="regist">등록일순</option>
        </select>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <!-- 긴급 섹션 (D-3 이하) -->
    <div id="urgent-section" class="section-wrap" style="display:none;">
      <div class="section-label urgent-label">마감 임박</div>
      <div class="card-list" id="urgent-list"></div>
    </div>

    <!-- 일반 목록 -->
    <div id="normal-section" class="section-wrap">
      <div class="card-list" id="card-list">
        <div class="loading">공고를 불러오는 중...</div>
      </div>
    </div>

    <footer>
      <span id="last-updated"></span>
    </footer>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>설정</h2>
        <button class="modal-close" id="close-settings">&times;</button>
      </div>

      <div class="modal-body">
        <!-- 관심 키워드 -->
        <div class="settings-section">
          <h3 class="section-title">관심 키워드</h3>
          <div class="field">
            <input type="text" id="interest-keywords" placeholder="콤마로 구분 (예: AI, 콘텐츠, 청년, 문화)" />
            <p class="field-hint">매칭된 공고가 하이라이트 표시됩니다.</p>
          </div>
        </div>

        <hr class="divider" />

        <!-- AI 설정 -->
        <div class="settings-section">
          <h3 class="section-title">AI 요약</h3>
          <div class="provider-tabs">
            <button class="provider-tab active" data-provider="gemini">Gemini</button>
            <button class="provider-tab" data-provider="openai">ChatGPT</button>
            <button class="provider-tab" data-provider="claude">Claude</button>
          </div>

          <!-- Gemini -->
          <div class="provider-panel active" id="panel-gemini">
            <div class="field">
              <label for="gemini-key">API Key</label>
              <div class="key-input-row">
                <input type="password" id="gemini-key" placeholder="Google AI Studio에서 발급받은 키" />
                <button class="toggle-key-btn" data-target="gemini-key">👁</button>
              </div>
              <p class="field-hint">
                <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>에서 무료 발급
              </p>
            </div>
            <div class="field">
              <label for="gemini-model">모델</label>
              <select id="gemini-model">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (무료, 추천)</option>
                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (무료)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro (무료 제한/유료)</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash (무료)</option>
              </select>
            </div>
          </div>

          <!-- ChatGPT -->
          <div class="provider-panel" id="panel-openai">
            <div class="field">
              <label for="openai-key">API Key</label>
              <div class="key-input-row">
                <input type="password" id="openai-key" placeholder="OpenAI에서 발급받은 키" />
                <button class="toggle-key-btn" data-target="openai-key">👁</button>
              </div>
              <p class="field-hint">
                <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">OpenAI Platform</a>에서 발급
              </p>
            </div>
            <div class="field">
              <label for="openai-model">모델</label>
              <select id="openai-model">
                <option value="gpt-5-mini">GPT-5 Mini (저렴, 추천)</option>
                <option value="gpt-5-nano">GPT-5 Nano (매우 저렴)</option>
                <option value="gpt-5">GPT-5 (유료)</option>
                <option value="gpt-5.2">GPT-5.2 (유료, 최신)</option>
                <option value="o3-mini">o3 Mini (추론 특화)</option>
              </select>
            </div>
          </div>

          <!-- Claude -->
          <div class="provider-panel" id="panel-claude">
            <div class="field">
              <label for="claude-key">API Key</label>
              <div class="key-input-row">
                <input type="password" id="claude-key" placeholder="Anthropic에서 발급받은 키" />
                <button class="toggle-key-btn" data-target="claude-key">👁</button>
              </div>
              <p class="field-hint">
                <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Anthropic Console</a>에서 발급
              </p>
            </div>
            <div class="field">
              <label for="claude-model">모델</label>
              <select id="claude-model">
                <option value="claude-haiku-4-5-20241022">Haiku 4.5 (저렴, 추천)</option>
                <option value="claude-sonnet-4-6">Sonnet 4.6 (균형)</option>
                <option value="claude-opus-4-6">Opus 4.6 (최고 성능)</option>
              </select>
            </div>
            <p class="field-hint" style="margin-top: -8px;">
              ⚠️ Claude API는 브라우저 직접 호출 시 CORS 제한이 있을 수 있습니다.
            </p>
          </div>

          <p class="field-hint" style="margin-top: 4px;">현재 선택된 탭의 AI가 요약에 사용됩니다.</p>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-save" id="save-settings">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
