name: GovBot Collector

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 평일만 UTC 0시 = KST 오전 9시 (월~금)
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect support programs
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          GOV24_API_KEY: ${{ secrets.GOV24_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: cd scripts && python collect_support.py

      - name: Collect bids
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: cd scripts && python collect_bids.py

      - name: Collect grants
        env:
          KOCCA_API_KEY: ${{ secrets.KOCCA_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: cd scripts && python collect_grants.py

      - name: Commit & push updated data
        run: |
          git config user.name 'govbot'
          git config user.email 'govbot@github.com'
          git add site/data/ seen_ids/
          git diff --cached --quiet || (git commit -m "Update data $(date +%Y-%m-%d)" && git push)
